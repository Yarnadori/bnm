name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: bnm-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: bnm-linux-arm64
          - goos: windows
            goarch: amd64
            asset_name: bnm-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset_name: bnm-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            asset_name: bnm-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: bnm-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.asset_name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create source archives
        run: |
          git archive --format=tar.gz --prefix=bnm-${{ github.ref_name }}/ HEAD -o dist/bnm-${{ github.ref_name }}.tar.gz
          git archive --format=zip    --prefix=bnm-${{ github.ref_name }}/ HEAD -o dist/bnm-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
